services:
  frontend:
    build:
      context: .
    container_name: riskapp-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - riskapp_frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL:
      VITE_API_BASE_PATHS: api
      VITE_REPORT_WS_URL:
      VITE_LOGROCKET_APP_ID:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET}
      VITE_WS_PROXY_TARGET: ${VITE_WS_PROXY_TARGET}
    depends_on:
      - backend
      - report-microservice


  postgres:
    image: postgres:16-alpine
    container_name: riskapp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - riskapp_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: riskapp-redis
    ports:
      - "6379:6379"
  
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: riskapp-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MICROSERVICE_BASE_URL: ${MICROSERVICE_BASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      BACKEND_INTERNAL_BASE_URL: ${BACKEND_INTERNAL_BASE_URL}
    depends_on:
      - postgres

  report-microservice:
    build:
      context: ./report_microservice
    container_name: riskapp-report-microservice
    ports:
      - "8100:8100"
    volumes:
      - ./report_microservice:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - backend
      - redis

volumes:
  riskapp_postgres_data:
  riskapp_frontend_node_modules:

